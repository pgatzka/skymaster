name: PR Decorator

run-name: >
  ${{ github.workflow }}: ${{ github.event_name }} for ${{ github.ref_name }} by @${{ github.actor }}

on:
  pull_request:
    types: [ opened ]

permissions:
  pull-requests: write

jobs:
  decorate:
    runs-on: ubuntu-latest
    steps:
      - name: Set title and description
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          NUMBER: ${{ github.event.pull_request.number }}
          BRANCH: ${{ github.head_ref }}
        run: |
          BODY=$(gh api "repos/$REPO/pulls/$NUMBER/commits" --paginate \
            --jq '.[] | "* [" + .sha[0:7] + "] " + (.commit.author.date | fromdateiso8601 | strftime("%d.%m.%Y %H:%M")) + " " + (.commit.message | split("\n")[0])')
          gh pr edit "$NUMBER" --repo "$REPO" --title "$BRANCH" --body "$BODY"