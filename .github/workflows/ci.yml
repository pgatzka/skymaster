name: CI

run-name: >
  ${{ github.workflow }}: ${{ github.event_name }} for ${{ github.ref_name }} by @${{ github.actor }}

concurrency:
  group: pr-decorator-${{ github.event.pull_request.number }}
  cancel-in-progress: true

on:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - synchronize
      - reopened

jobs:
  check-formatting:
    name: Check Formatting
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Setup Java 21
        uses: actions/setup-java@v5
        with:
          java-version: 21
          distribution: temurin
          cache: maven
      - name: mvn spotless:check
        run: ./mvnw -B spotless:check
  check-compilation:
    name: Check Compilation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Setup Java 21
        uses: actions/setup-java@v5
        with:
          java-version: 21
          distribution: temurin
          cache: maven
      - name: mvn compile
        run: ./mvnw -B compile
  run-tests:
    name: Run Tests
    runs-on: ubuntu-latest
    needs:
      - check-compilation
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Setup Java 21
        uses: actions/setup-java@v5
        with:
          java-version: 21
          distribution: temurin
          cache: maven
      - name: mvn test
        run: ./mvnw -B test
  build:
    name: Build
    runs-on: ubuntu-latest
    needs:
      - run-tests
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Setup Java 21
        uses: actions/setup-java@v5
        with:
          java-version: 21
          distribution: temurin
          cache: maven
      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: mvn package
        run: ./mvnw -B package -Dmaven.test.skip -Pproduction
      - name: Upload jar
        uses: actions/upload-artifact@v7
        with:
          name: app-jar
          path: target/*.jar
          if-no-files-found: error
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    needs:
      - run-tests
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Setup Java 21
        uses: actions/setup-java@v5
        with:
          java-version: 21
          distribution: temurin
          cache: maven
      - name: Setup sonar Cache
        uses: actions/cache@v6
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar
      - name: mvn sonar:sonar
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: ./mvnw -B compile sonar:sonar
      - name: Update dependency graph
        uses: advanced-security/maven-dependency-submission-action@v5
  package:
    name: Package
    runs-on: ubuntu-latest
    needs:
      - build
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Setup Java 21
        uses: actions/setup-java@v5
        with:
          java-version: 21
          distribution: temurin
          cache: maven
      - name: Setup Buildx
        uses: docker/setup-buildx-action@v4
      - name: Extract version
        id: extract-version
        run: echo "value=$(./mvnw help:evaluate -Dexpression=project.version -q -DforceStdout)" >> "$GITHUB_OUTPUT"
      - name: Download jar
        uses: actions/download-artifact@v8
        with:
          name: app-jar
          path: target
      - name: Compute tags
        id: tags
        run: |
          IMAGE="ghcr.io/$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')/skymaster"
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            {
              echo "list<<EOF"
              echo "$IMAGE:latest"
              echo "$IMAGE:${{ steps.extract-version.outputs.value }}"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          else
            echo "list=$IMAGE:${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          fi
      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          outputs: type=docker,dest=/tmp/image.tar
          tags: ${{ steps.tags.outputs.list }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Upload image
        uses: actions/upload-artifact@v7
        with:
          name: image
          path: /tmp/image.tar
          if-no-files-found: error
  publish:
    name: Publish
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    needs:
      - analyze
      - package
    steps:
      - name: Download image
        uses: actions/download-artifact@v8
        with:
          name: image
          path: /tmp
      - name: Resolve image name
        id: image
        run: echo "value=ghcr.io/$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')/skymaster" >> "$GITHUB_OUTPUT"
      - name: Load image
        run: docker load --input /tmp/image.tar
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Push image
        run: docker push --all-tags ${{ steps.image.outputs.value }}
